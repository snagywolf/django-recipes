{% extends 'recipes/page/base.html' %}

{% block content %}

<h2 class="mb-4">🍽️ Receitas</h2>

<form method="GET" class="d-flex gap-2 mb-4">

    <input type="text" name="q" value="{{ query }}" class="form-control" placeholder="Buscar...">

    <button class="btn btn-primary">Buscar</button>

</form>

<div class="row">

    {% for recipe in recipes %}

    <div class="col-md-4 mb-3">

        <div class="card shadow-sm">

            {% if recipe.image %}
                <img src="{{ recipe.image.url }}" class="card-img-top" style="height:200px; object-fit:cover;">
            {% endif %}

            <div class="card-body">

                <h5> Titulo:{{ recipe.title }}</h5>

                <p class="text-muted">
                    Description:{{ recipe.description|truncatechars:80 }}
                </p>

                <a href="{% url 'recipe' recipe.slug %}" class="btn btn-primary btn-sm">
                    Ver receita
                </a>

            </div>

        </div>

    </div>

    {% empty %}
        <p>Nenhuma receita encontrada.</p>
    {% endfor %}

</div>

{% endblock %}
