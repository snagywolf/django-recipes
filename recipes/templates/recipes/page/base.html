<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Recipes{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">

            <a class="navbar-brand fw-bold" href="{% url 'home' %}">
                🍲 Recipes
            </a>

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <div class="navbar-nav me-auto">
                    <a class="nav-link" href="{% url 'home' %}">
                        Home
                    </a>
                </div>

                <div class="d-flex align-items-center gap-2">

                    {% if user.is_authenticated %}

                        <a class="btn btn-success btn-sm" href="{% url 'create_recipe' %}">
                            Criar
                        </a>

                        <a class="btn btn-outline-light btn-sm" href="{% url 'dashboard' %}">
                            Dashboard
                        </a>

                        <form method="post" action="{% url 'logout' %}" class="m-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger btn-sm">
                                Sair
                            </button>
                        </form>

                    {% else %}

                        <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">
                            Login
                        </a>

                        <a class="btn btn-primary btn-sm" href="{% url 'register' %}">
                            Register
                        </a>

                    {% endif %}

                </div>

            </div>

        </div>
    </nav>

    <main class="container py-4">

        {% block content %}
        {% endblock %}

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
